<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 시대 질문 훈련 - 3단계 질문법</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1e3a5f 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: #b0bec5;
            margin-top: 10px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #4fc3f7;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(79, 195, 247, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1em;
            resize: vertical;
            min-height: 100px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            background: rgba(255, 255, 255, 0.1);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .examples {
            margin-top: 15px;
            padding: 15px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 10px;
            border-left: 4px solid #4fc3f7;
        }

        .examples p {
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #b0bec5;
        }

        .examples strong {
            color: #4fc3f7;
        }

        button {
            background: linear-gradient(90deg, #4fc3f7, #29b6f6);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #455a64;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4fc3f7;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
        }

        .situation-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 4px solid #ffd54f;
        }

        .situation-display h3 {
            color: #ffd54f;
            margin-bottom: 10px;
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .step-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .step-1 .step-badge {
            background: rgba(102, 187, 106, 0.2);
            color: #66bb6a;
            border: 1px solid #66bb6a;
        }

        .step-2 .step-badge {
            background: rgba(255, 167, 38, 0.2);
            color: #ffa726;
            border: 1px solid #ffa726;
        }

        .step-3 .step-badge {
            background: rgba(171, 71, 188, 0.2);
            color: #ab47bc;
            border: 1px solid #ab47bc;
        }

        .question-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #fff;
        }

        .question-text {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            line-height: 1.6;
            color: #e0e0e0;
            border-left: 3px solid;
        }

        .step-1 .question-text {
            border-left-color: #66bb6a;
        }

        .step-2 .question-text {
            border-left-color: #ffa726;
        }

        .step-3 .question-text {
            border-left-color: #ab47bc;
        }

        .reset-button {
            background: rgba(255, 255, 255, 0.1);
            margin-top: 20px;
        }

        .reset-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .questions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 AI 시대 질문 훈련</h1>
            <p class="subtitle">자녀의 미래 역량 마스터 클래스: 가정에서 실천하는 질문법 3단계</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <label for="situation">아이가 겪고 있는 상황을 입력해주세요:</label>
                <textarea 
                    id="situation" 
                    placeholder="예: 오늘 학교 급식이 너무 맛없어!"
                ></textarea>
            </div>

            <div class="examples">
                <p><strong>예시 상황:</strong></p>
                <p>• "친구들은 다 있는데, 나도 이 게임기 사줘!"</p>
                <p>• "이 학원 너무 힘들어, 이제 그만둘래"</p>
                <p>• "숙제가 너무 많아서 하기 싫어요"</p>
                <p>• "친구가 나를 놀렸어요"</p>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button id="generateBtn" onclick="generateQuestions()">
                    💭 3단계 질문 만들기
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI가 상황에 맞는 질문을 생성하고 있습니다...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <div class="situation-display">
                <h3>📋 입력된 상황</h3>
                <p id="situationDisplay"></p>
            </div>

            <div class="questions-grid">
                <div class="question-card step-1">
                    <span class="step-badge">STEP 1</span>
                    <h3 class="question-title">💡 가정하기 (What if?)</h3>
                    <div class="question-text" id="question1"></div>
                </div>

                <div class="question-card step-2">
                    <span class="step-badge">STEP 2</span>
                    <h3 class="question-title">🧩 본질 찾기 (Why?)</h3>
                    <div class="question-text" id="question2"></div>
                </div>

                <div class="question-card step-3">
                    <span class="step-badge">STEP 3</span>
                    <h3 class="question-title">🔄 관점 전환 (Perspective)</h3>
                    <div class="question-text" id="question3"></div>
                </div>
            </div>

            <div style="text-align: center;">
                <button class="reset-button" onclick="resetForm()">
                    🔄 새로운 상황 입력하기
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generateQuestions() {
            const situation = document.getElementById('situation').value.trim();
            
            if (!situation) {
                showError('상황을 입력해주세요.');
                return;
            }

            // UI 상태 변경
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: `다음 상황에 대해 부모가 아이에게 던질 수 있는 3단계 질문을 생성해주세요.

상황: "${situation}"

아래 프레임워크에 따라 각 단계별로 1개씩, 총 3개의 질문을 만들어주세요:

1단계: 가정하기 (What if?) - 당연함을 의심하고 가정을 통해 새로운 관점을 열어주는 질문
2단계: 본질 찾기 (Why?) - 아이의 생각 뒤에 숨은 진짜 이유를 찾게 하는 질문
3단계: 관점 전환 (Perspective) - 다른 사람의 입장에서 생각해보게 하는 질문

응답은 반드시 다음 JSON 형식으로만 작성해주세요:
{
  "question1": "1단계 질문",
  "question2": "2단계 질문",
  "question3": "3단계 질문"
}

질문은 자연스럽고 따뜻한 대화체로 작성하며, 아이의 나이에 맞게 이해하기 쉬운 언어를 사용하세요.`
                        }]
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || '질문 생성에 실패했습니다.');
                }

                // Claude의 응답에서 텍스트 추출
                const textContent = data.content
                    .filter(item => item.type === 'text')
                    .map(item => item.text)
                    .join('');

                // JSON 파싱
                const cleanText = textContent.replace(/```json|```/g, '').trim();
                const questions = JSON.parse(cleanText);

                // 결과 표시
                displayResults(situation, questions);

            } catch (error) {
                console.error('Error:', error);
                showError('질문 생성 중 오류가 발생했습니다: ' + error.message);
            } finally {
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(situation, questions) {
            document.getElementById('situationDisplay').textContent = situation;
            document.getElementById('question1').textContent = questions.question1;
            document.getElementById('question2').textContent = questions.question2;
            document.getElementById('question3').textContent = questions.question3;
            document.getElementById('results').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function resetForm() {
            document.getElementById('situation').value = '';
            document.getElementById('results').style.display = 'none';
            document.getElementById('situation').focus();
        }

        // Enter 키로 생성하기 (Shift+Enter는 줄바꿈)
        document.getElementById('situation').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQuestions();
            }
        });
    </script>
</body>
</html>
